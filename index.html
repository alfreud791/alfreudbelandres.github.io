<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfreud Belandres Portfolio</title>
    <style>
        /* Removes default browser spacing */
        body {
            margin: 0;
            padding: 0;
        }

        /* Makes the image perfectly fluid and responsive */
        .responsive-img {
            width: 100%;        /* Takes up 100% of the available screen width */
            height: auto;       /* Maintains the aspect ratio so it doesn't distort */
            display: block;     /* Eliminates the tiny default gap under images */
        }
    </style>
</head>
<body>

    <img src="Photos/Part 1.png" alt="Responsive Header Image" class="responsive-img">

</body>
</html>
